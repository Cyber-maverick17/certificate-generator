<!DOCTYPE html>
<html>
<head>
<title>Certificate Generator</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

body{
font-family: 'Times New Roman';
background:#f4f4f4;
text-align:center;
}

/* INPUTS */

input{
padding:8px;
margin:6px;
width:260px;
}

button{
padding:10px 18px;
margin:10px;
cursor:pointer;
}

/* CERTIFICATE */

#certificate{

width:1000px;
height:600px;

margin:auto;
margin-top:30px;

background:white;

border:15px solid #c9a646;   /* professional gold border */

padding:50px;

position:relative;

display:none;

box-shadow:0 0 10px gray;

}

/* CORNER DESIGN */

.corner{
position:absolute;
font-size:28px;
color:#c9a646;
}

.c1{top:10px;left:20px;}
.c2{top:10px;right:20px;}
.c3{bottom:10px;left:20px;}
.c4{bottom:10px;right:20px;}

/* LOGO */

.logo{
position:absolute;
top:30px;
left:40px;
width:100px;
}

/* PHOTO */

.photo{
position:absolute;
top:30px;
right:40px;
width:120px;
height:150px;
border:2px solid black;
object-fit:cover;
}

/* TEXT */

.heading{
font-size:32px;
font-weight:bold;
margin-top:30px;
}

.title{
font-size:40px;
margin-top:10px;
}

.name{
font-size:36px;
font-weight:bold;
margin:20px;
}

.sentence{
font-size:22px;
}

.event{
font-size:26px;
margin-top:10px;
}

/* DATE & PLACE */

.bottomLeft{
position:absolute;
bottom:40px;
left:60px;
font-size:18px;
text-align:left;
}

/* SIGNATURE */

.signature{
position:absolute;
bottom:40px;
right:80px;
text-align:center;
}

.line{
border-top:2px solid black;
width:200px;
margin:auto;
margin-bottom:5px;
}

</style>
</head>

<body>

<h2>Certificate Generator</h2>

<input type="text" id="heading" placeholder="Institution Name"><br>

<input type="text" id="name" placeholder="Student Name"><br>

<input type="text" id="sentence" placeholder="Sentence (Example: For successfully completing)"><br>

<input type="text" id="event" placeholder="Event Name"><br>

<input type="text" id="place" placeholder="Place"><br>

<input type="date" id="date"><br>

<label>Upload Logo</label><br>
<input type="file" id="logo"><br>

<label>Upload Student Photo</label><br>
<input type="file" id="photo"><br>

<button onclick="generate()">Generate Certificate</button>

<button onclick="downloadPDF()">Download as PDF</button>


<div id="certificate">

<div class="corner c1">❀</div>
<div class="corner c2">❀</div>
<div class="corner c3">❀</div>
<div class="corner c4">❀</div>

<img id="certLogo" class="logo">
<img id="certPhoto" class="photo">

<div class="heading" id="certHeading"></div>

<div class="title">Certificate of Achievement</div>

<p>This certificate is proudly presented to</p>

<div class="name" id="certName"></div>

<div class="sentence" id="certSentence"></div>

<div class="event" id="certEvent"></div>

<div class="bottomLeft">
Date: <span id="certDate"></span><br>
Place: <span id="certPlace"></span>
</div>

<div class="signature">

<div class="line"></div>

Authorized Signature

</div>

</div>

<script>

function generate(){

document.getElementById("certificate").style.display="block";

document.getElementById("certHeading").innerText=document.getElementById("heading").value;

document.getElementById("certName").innerText=document.getElementById("name").value;

document.getElementById("certSentence").innerText=document.getElementById("sentence").value;

document.getElementById("certEvent").innerText=document.getElementById("event").value;

document.getElementById("certDate").innerText=document.getElementById("date").value;

document.getElementById("certPlace").innerText=document.getElementById("place").value;

/* LOGO */

let logo=document.getElementById("logo").files[0];

if(logo){

let reader=new FileReader();

reader.onload=function(e){

document.getElementById("certLogo").src=e.target.result;

}

reader.readAsDataURL(logo);

}

/* PHOTO */

let photo=document.getElementById("photo").files[0];

if(photo){

let reader=new FileReader();

reader.onload=function(e){

document.getElementById("certPhoto").src=e.target.result;

}

reader.readAsDataURL(photo);

}

}

function downloadPDF(){

var element=document.getElementById("certificate");

html2pdf().from(element).save("certificate.pdf");

}

</script>

</body>
</html>
```
