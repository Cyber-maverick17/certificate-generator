<!DOCTYPE html>
<html>
<head>
<title>Certificate Generator</title>

<style>

body{
font-family: Arial;
text-align:center;
background:#f2f2f2;
}

input{
padding:8px;
margin:5px;
}

button{
padding:10px 20px;
background:green;
color:white;
border:none;
cursor:pointer;
}

#certificate{
width:900px;
height:600px;
margin:30px auto;
background:white;
border:15px solid #d4af37;
position:relative;
padding:40px;
}

.logo{
width:100px;
}

.signature{
width:150px;
margin-top:40px;
}

.watermark{
position:absolute;
top:150px;
left:250px;
opacity:0.08;
width:400px;
}

/* Photo right side */

.photo-box{
position:absolute;
top:120px;
right:50px;
width:120px;
height:150px;
border:2px solid #000;
}

.photo-box img{
width:100%;
height:100%;
object-fit:cover;
}

</style>
</head>

<body>

<h1>Certificate Generator</h1>

<input type="text" id="name" placeholder="Enter Student Name">
<input type="date" id="date">
<input type="file" id="photo">

<br><br>

<button onclick="generate()">Generate Certificate</button>

<div id="certificate">

<img src="logo.png" class="logo">

<h1>CERTIFICATE OF ACHIEVEMENT</h1>

<p>This certificate is proudly presented to</p>

<h2 id="studentName">Student Name</h2>

<p>For successfully completing the course.</p>

<p id="certDate"></p>

<img src="watermark.png" class="watermark">

<div class="photo-box">
<img id="studentPhoto">
</div>

<img src="sign.png" class="signature">

<p>Authorized Signature</p>

</div>

<script>

function generate(){

var name=document.getElementById("name").value;
var date=document.getElementById("date").value;

document.getElementById("studentName").innerHTML=name;
document.getElementById("certDate").innerHTML=date;

var file=document.getElementById("photo").files[0];
var reader=new FileReader();

reader.onload=function(e){
document.getElementById("studentPhoto").src=e.target.result;
}

reader.readAsDataURL(file);

}

</script>

</body>
</html>
